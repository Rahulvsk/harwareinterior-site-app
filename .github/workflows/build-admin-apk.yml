name: Build Admin APK

# Run manually from the Actions tab ("Run workflow"), or automatically
# whenever the admin app changes on the main branch.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/admin-app/**"
      - ".github/workflows/build-admin-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/admin-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-apk
          path: mobile/admin-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
